services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: worldplaydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d worldplaydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
      - "5556:5556"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4

  media-server:
    build:
      context: .
      dockerfile: packages/media-server/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # השורה הזו היא הקסם - היא מחברת את התיקייה במחשב לתוך הדוקר
      - ./packages/media-server:/usr/src/app/packages/media-server
      # מונע מהדוקר לדרוס את ה-node_modules המקומיים
      - /usr/src/app/packages/media-server/node_modules
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - ANNOUNCED_IP=${ANNOUNCED_IP:-192.168.33.17}
      - MEDIA_PORT=8000
    ports:
      - "8000:8000" 
      - "11000-11200:11000-11200/udp"
      - "11000-11200:11000-11200/tcp"
    depends_on:
      db:
        condition: service_healthy
  prisma-studio:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    command: npx prisma studio --port 5556 --browser none --hostname 0.0.0.0
    ports:
      - "5557:5556"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      - db
volumes:
  postgres_data: